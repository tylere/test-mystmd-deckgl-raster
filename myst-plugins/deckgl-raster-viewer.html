<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>deck.gl COG viewer</title>
  <style>
    html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; }
    #status { position: absolute; top: 8px; left: 8px; z-index: 10;
              font: 12px/1.3 system-ui, sans-serif; background: rgba(255,255,255,0.9);
              padding: 6px 8px; border-radius: 4px; max-width: 80%; white-space: pre-wrap; }
    #status.err { background: #fee; color: #900; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script type="importmap">
  {
    "imports": {
      "@deck.gl/core":        "https://esm.sh/@deck.gl/core@9.3.0",
      "@deck.gl/layers":      "https://esm.sh/@deck.gl/layers@9.3.0",
      "@deck.gl/geo-layers":  "https://esm.sh/@deck.gl/geo-layers@9.3.0",
      "@deck.gl/mesh-layers": "https://esm.sh/@deck.gl/mesh-layers@9.3.0",
      "@deck.gl/mapbox":      "https://esm.sh/@deck.gl/mapbox@9.3.0",
      "@luma.gl/core":        "https://esm.sh/@luma.gl/core@9.3.2",
      "@luma.gl/engine":      "https://esm.sh/@luma.gl/engine@9.3.2",
      "@luma.gl/webgl":       "https://esm.sh/@luma.gl/webgl@9.3.2",
      "@luma.gl/shadertools": "https://esm.sh/@luma.gl/shadertools@9.3.2",
      "proj4":                "https://esm.sh/proj4@2.11.0"
    }
  }
  </script>
</head>
<body>
  <div id="map"></div>
  <div id="status">Loading…</div>
  <script type="module">
    const status = document.getElementById("status");
    const log = (msg) => { status.textContent = msg; console.log(msg); };
    const fail = (msg) => { status.classList.add("err"); status.textContent = String(msg); console.error(msg); throw new Error(msg); };
    window.addEventListener("error", (e) => fail(`JS error: ${e.message}`));
    window.addEventListener("unhandledrejection", (e) => fail(`Promise rejection: ${e.reason?.message ?? e.reason}`));

    try {
      log("Loading libraries…");
      const [{ MapboxOverlay }, { TileLayer }, { BitmapLayer }, geotiffMod, cogMod, dsGeotiffMod, proj4Mod] = await Promise.all([
        import("@deck.gl/mapbox"),
        import("@deck.gl/geo-layers"),
        import("@deck.gl/layers"),
        import("https://esm.sh/geotiff@2.1.3"),
        import("https://esm.sh/@developmentseed/deck.gl-geotiff@0.7.0?bundle-deps&external=proj4"),
        import("https://esm.sh/@developmentseed/geotiff@0.7.0?bundle-deps&external=proj4"),
        import("proj4"),
      ]);
      const { fromUrl } = geotiffMod;
      const { COGLayer } = cogMod;
      const { DecoderPool } = dsGeotiffMod;
      const proj4 = proj4Mod.default ?? proj4Mod;
      // Main-thread decoder pool — workers can't be spawned in a data: iframe.
      const mainThreadPool = new DecoderPool({});

      const cogUrl = __COG_URL__;
      log(`Probing COG: ${cogUrl}`);

      // Inspect the COG to decide which rendering path to use.
      const tiff = await fromUrl(cogUrl);
      const main = await tiff.getImage(0);
      const geoKeys = main.getGeoKeys() ?? {};
      const epsg = geoKeys.ProjectedCSTypeGeoKey || geoKeys.GeographicTypeGeoKey || 4326;
      const isGeographic = !geoKeys.ProjectedCSTypeGeoKey;
      console.log("[viewer] CRS:", { epsg, isGeographic, geoKeys });

      const map = new maplibregl.Map({
        container: "map",
        style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
        center: [0, 0],
        zoom: 1,
      });
      const overlay = new MapboxOverlay({ layers: [] });
      await new Promise((r) => map.on("load", r));
      map.addControl(overlay);

      if (isGeographic) {
        log(`Geographic COG (EPSG:${epsg}) — using direct TileLayer`);
        await renderGeographic();
      } else {
        log(`Projected COG (EPSG:${epsg}) — using COGLayer`);
        await renderProjected();
      }

      // ---- Projected path: GPU-warp via COGLayer ----
      async function renderProjected() {
        const projStr = (e) => {
          if (e === 3857) return "+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs";
          if (e >= 32601 && e <= 32660) return `+proj=utm +zone=${e - 32600} +datum=WGS84 +units=m +no_defs`;
          if (e >= 32701 && e <= 32760) return `+proj=utm +zone=${e - 32700} +south +datum=WGS84 +units=m +no_defs`;
          return null;
        };
        const epsgResolver = async (e) => {
          const key = `EPSG:${e}`;
          const s = projStr(e);
          if (s) {
            if (!proj4.defs(key)) proj4.defs(key, s);
            return proj4.defs(key);
          }
          fail(`Unsupported projected EPSG:${e} for the COGLayer path.`);
        };
        const layer = new COGLayer({
          id: "cog",
          geotiff: cogUrl,
          epsgResolver,
          pool: mainThreadPool,
          onGeoTIFFLoad: (_t, info) => {
            const b = info?.geographicBounds;
            if (b) map.fitBounds([[b.west, b.south], [b.east, b.north]], { padding: 20, duration: 0 });
            status.remove();
          },
        });
        overlay.setProps({ layers: [layer] });
      }

      // ---- Geographic path: read native lng/lat windows into a BitmapLayer ----
      async function renderGeographic() {
        const samplesPerPixel = main.getSamplesPerPixel();
        const mainBbox = main.getBoundingBox(); // [w, s, e, n] in degrees
        const [originX, originY] = main.getOrigin();
        const [resX, resY] = main.getResolution();
        const mainW = main.getWidth();
        const nodata = main.getGDALNoData();

        const count = await tiff.getImageCount();
        const levels = [];
        for (let i = 0; i < count; i++) {
          const img = await tiff.getImage(i);
          levels.push({ image: img, width: img.getWidth(), height: img.getHeight(), scale: mainW / img.getWidth() });
        }
        levels.sort((a, b) => a.scale - b.scale);

        const stretchByte = (band) => {
          if (band instanceof Uint8Array) return band;
          let min = Infinity, max = -Infinity;
          for (let i = 0; i < band.length; i++) {
            const v = band[i];
            if (nodata != null && v === nodata) continue;
            if (!Number.isFinite(v)) continue;
            if (v < min) min = v;
            if (v > max) max = v;
          }
          if (!Number.isFinite(min) || max === min) { min = 0; max = 1; }
          const out = new Uint8Array(band.length);
          const scale = 255 / (max - min);
          for (let i = 0; i < band.length; i++) {
            const v = band[i];
            out[i] = (nodata != null && v === nodata) ? 0 : Math.max(0, Math.min(255, (v - min) * scale));
          }
          return out;
        };
        const rastersToRGBA = (rasters, w, h) => {
          const rgba = new Uint8ClampedArray(w * h * 4);
          if (samplesPerPixel >= 3) {
            const r = stretchByte(rasters[0]);
            const g = stretchByte(rasters[1]);
            const b = stretchByte(rasters[2]);
            const a = samplesPerPixel >= 4 ? stretchByte(rasters[3]) : null;
            for (let i = 0, j = 0; i < w * h; i++, j += 4) {
              rgba[j] = r[i]; rgba[j+1] = g[i]; rgba[j+2] = b[i];
              rgba[j+3] = a ? a[i] : (nodata != null && rasters[0][i] === nodata ? 0 : 255);
            }
          } else {
            const v = stretchByte(rasters[0]);
            const src = rasters[0];
            for (let i = 0, j = 0; i < w * h; i++, j += 4) {
              const isNodata = nodata != null && src[i] === nodata;
              rgba[j] = rgba[j+1] = rgba[j+2] = v[i];
              rgba[j+3] = isNodata ? 0 : 255;
            }
          }
          return rgba;
        };

        const tileLayer = new TileLayer({
          id: "cog-tiles",
          tileSize: 256,
          extent: mainBbox,
          maxRequests: 6,
          getTileData: async ({ bbox: { west, south, east, north }, signal }) => {
            const px = (x) => (x - originX) / resX;
            const py = (y) => (y - originY) / resY;
            const px0 = Math.min(px(west), px(east));
            const px1 = Math.max(px(west), px(east));
            const py0 = Math.min(py(south), py(north));
            const py1 = Math.max(py(south), py(north));
            const targetDownsample = Math.max(1, (px1 - px0) / 256);
            let chosen = levels[0];
            for (const lvl of levels) {
              if (lvl.scale <= targetDownsample) chosen = lvl;
              else break;
            }
            const s = chosen.scale;
            let lx0 = Math.max(0, Math.floor(px0 / s) - 1);
            let lx1 = Math.min(chosen.width, Math.ceil(px1 / s) + 1);
            let ly0 = Math.max(0, Math.floor(py0 / s) - 1);
            let ly1 = Math.min(chosen.height, Math.ceil(py1 / s) + 1);
            if (lx1 <= lx0 || ly1 <= ly0) return null;
            const winW = lx1 - lx0;
            const winH = ly1 - ly0;
            const rasters = await chosen.image.readRasters({
              window: [lx0, ly0, lx1, ly1], interleave: false, signal,
            });
            const rgba = rastersToRGBA(rasters, winW, winH);
            const canvas = document.createElement("canvas");
            canvas.width = winW; canvas.height = winH;
            canvas.getContext("2d").putImageData(new ImageData(rgba, winW, winH), 0, 0);
            // The window covers a lng/lat rectangle determined by its pixel bounds:
            const wLng = originX + lx0 * s * resX;
            const eLng = originX + lx1 * s * resX;
            const nLat = originY + ly0 * s * resY;
            const sLat = originY + ly1 * s * resY;
            return { image: await createImageBitmap(canvas), bounds: [wLng, Math.min(nLat, sLat), eLng, Math.max(nLat, sLat)] };
          },
          renderSubLayers: (props) => {
            if (!props.data) return null;
            return new BitmapLayer(props, {
              data: null,
              image: props.data.image,
              bounds: props.data.bounds,
            });
          },
        });

        const [w, s, e, n] = mainBbox;
        map.fitBounds([[w, s], [e, n]], { padding: 20, duration: 0 });
        overlay.setProps({ layers: [tileLayer] });
        status.remove();
      }
    } catch (e) {
      fail(e?.message ?? String(e));
    }
  </script>
</body>
</html>
